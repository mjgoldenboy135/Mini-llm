###############################################################
# Safe Pharmacy — Render Blueprint
# Deploy with: connect repo on render.com → "New Blueprint"
#
# NOTE: Free tier allows only 1 PostgreSQL database per account.
# Supply DATABASE_URL manually from your existing Render DB or
# a free external DB (Supabase / Neon / Railway).
###############################################################

services:
  # ── Redis ──────────────────────────────────────────────────
  - type: redis
    name: safe-pharmacy-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Django API (ASGI via Daphne) ───────────────────────────
  - type: web
    name: safe-pharmacy-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    healthCheckPath: /api/products/categories/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false           # paste your PostgreSQL connection string here
      - key: REDIS_URL
        fromService:
          name: safe-pharmacy-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: DJANGO_SUPERUSER_MOBILE
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  # ── Celery Worker ──────────────────────────────────────────
  - type: worker
    name: safe-pharmacy-celery
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info --concurrency=2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromService:
          name: safe-pharmacy-api
          type: web
          envVarKey: DATABASE_URL
      - key: REDIS_URL
        fromService:
          name: safe-pharmacy-redis
          type: redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          name: safe-pharmacy-api
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Next.js Frontend ───────────────────────────────────────
  - type: web
    name: safe-pharmacy-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        sync: false           # set to https://safe-pharmacy-api.onrender.com/api
