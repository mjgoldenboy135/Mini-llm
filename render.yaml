###############################################################
# Safe Pharmacy — Render Blueprint
# Deploy with: connect repo on render.com → "New Blueprint"
###############################################################

databases:
  - name: safe-pharmacy-db
    databaseName: safe_pharmacy
    user: pharmacy
    region: oregon
    plan: free          # upgrade to starter/standard for production

services:
  # ── Redis ──────────────────────────────────────────────────
  - type: redis
    name: safe-pharmacy-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []     # only allow internal access

  # ── Django API (ASGI via Daphne) ───────────────────────────
  - type: web
    name: safe-pharmacy-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    healthCheckPath: /api/products/categories/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: safe-pharmacy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: safe-pharmacy-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"                       # tighten to .onrender.com after first deploy
      - key: CORS_ALLOWED_ORIGINS
        value: ""                        # set to https://your-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Optional — fill in Render dashboard after deploy
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Superuser created on first build
      - key: DJANGO_SUPERUSER_MOBILE
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  # ── Celery Worker ──────────────────────────────────────────
  - type: worker
    name: safe-pharmacy-celery
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info --concurrency=2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: safe-pharmacy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: safe-pharmacy-redis
          type: redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        fromService:
          name: safe-pharmacy-api
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: TWILIO_ACCOUNT_SID
        fromService:
          name: safe-pharmacy-api
          type: web
          envVarKey: TWILIO_ACCOUNT_SID
      - key: TWILIO_AUTH_TOKEN
        fromService:
          name: safe-pharmacy-api
          type: web
          envVarKey: TWILIO_AUTH_TOKEN
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Next.js Frontend ───────────────────────────────────────
  - type: web
    name: safe-pharmacy-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Set to your deployed API URL: https://safe-pharmacy-api.onrender.com/api
      - key: NEXT_PUBLIC_API_URL
        sync: false
